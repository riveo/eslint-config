version: 2
updates:
  - package-ecosystem: npm
    directory: /
    exclude-paths:
      - tests/apps/**
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      non-major:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major
