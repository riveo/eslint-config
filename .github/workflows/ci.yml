name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node-pnpm

      - name: Check
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test
